<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giorgio Riva</title>
<meta name="description" content="Freedom is a state of mind.">
<meta property="og:title" content="Giorgio Riva">
<meta property="og:description" content="Freedom is a state of mind.">
<meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Daruma_with_no_eyes_filled_in.JPG/800px-Daruma_with_no_eyes_filled_in.JPG">
<meta property="og:image:width" content="800">
<meta property="og:image:height" content="600">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Giorgio Riva">
<meta name="twitter:description" content="Freedom is a state of mind.">
<meta name="twitter:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Daruma_with_no_eyes_filled_in.JPG/800px-Daruma_with_no_eyes_filled_in.JPG">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0E0E0E;
  --line: rgba(255,255,255,0.07);
  --text: #E8E2D9;
  --muted: #6B6560;
  --accent: #C8A97E;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Montserrat', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  height: 100vh;
  overflow: hidden;
  cursor: none;
}

a, button { cursor: none; }

/* CURSOR */
#cur-dot {
  position: fixed;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .2s, height .2s, background .2s;
}
#cur-ring {
  position: fixed;
  width: 32px; height: 32px;
  border: 1px solid rgba(200,169,126,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width .25s, height .25s, border-color .25s;
}
body.hov #cur-dot { width: 10px; height: 10px; background: #fff; }
body.hov #cur-ring { width: 50px; height: 50px; border-color: rgba(200,169,126,0.9); }

/* HERO */
.hero {
  height: calc(100vh - 60px);
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 0 3.5rem;
  gap: 4rem;
}
.hero-left { display: flex; flex-direction: column; gap: 1.5rem; }

.hero-name {
  font-family: var(--serif);
  font-size: clamp(4rem, 7.5vw, 8.5rem);
  font-weight: 300;
  line-height: 0.95;
  color: var(--text);
}
.hero-name em { font-style: italic; color: var(--accent); }

.hero-rule { width: 36px; height: 1px; background: var(--accent); opacity: 0.6; }

.hero-tagline {
  font-family: var(--serif);
  font-size: clamp(1.05rem, 1.5vw, 1.3rem);
  font-style: italic;
  font-weight: 300;
  color: var(--muted);
  line-height: 1.6;
  max-width: 340px;
}

.hero-right { display: flex; align-items: center; justify-content: center; }

#globe-wrap { width: min(48vw, 560px); height: min(48vw, 560px); position: relative; }
#globe-wrap svg { width: 100%; height: 100%; display: block; }
#city-overlay { position: absolute; inset: 0; pointer-events: none; }

/* FOOTER */
footer {
  height: 60px;
  border-top: 1px solid var(--line);
  padding: 0 3.5rem;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}
.footer-links { display: flex; gap: 2.5rem; list-style: none; }
.footer-links a {
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}
.footer-links a:hover { color: var(--accent); }

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero-name    { animation: fadeUp .7s ease both .25s; }
.hero-rule    { animation: fadeUp .5s ease both .4s; }
.hero-tagline { animation: fadeUp .7s ease both .5s; }
.hero-right   { animation: fadeUp 1s  ease both .3s; }

@media (max-width: 768px) {
  body { overflow-y: auto; height: auto; }
  .hero { height: auto; min-height: 100vh; grid-template-columns: 1fr; padding: 2rem 1.5rem; gap: 2rem; }
  #globe-wrap { width: 75vw; height: 75vw; }
  footer { height: auto; padding: 1.5rem; }
}
</style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>

<section class="hero">
  <div class="hero-left">
    <h1 class="hero-name">Giorgio<br><em>Riva</em></h1>
    <div class="hero-rule"></div>
    <p class="hero-tagline">Freedom is a state of mind.</p>
  </div>
  <div class="hero-right">
    <div id="globe-wrap">
      <svg id="globe" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="city-overlay"></div>
    </div>
  </div>
</section>

<footer>
  <ul class="footer-links">
    <li><a href="https://www.instagram.com/gioriva" target="_blank">Instagram</a></li>
    <li><a href="https://www.linkedin.com/in/giorgioriva/" target="_blank">LinkedIn</a></li>
  </ul>
</footer>

<script>
/* ── CURSOR ── */
var dot  = document.getElementById('cur-dot');
var ring = document.getElementById('cur-ring');
var mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', function(e) {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + 'px';
  dot.style.top  = my + 'px';
});

function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
}
animRing();

document.querySelectorAll('a, button').forEach(function(el) {
  el.addEventListener('mouseenter', function() { document.body.classList.add('hov'); });
  el.addEventListener('mouseleave', function() { document.body.classList.remove('hov'); });
});

/* ── GLOBE ── */
var svgEl = document.getElementById('globe');
var NS = 'http://www.w3.org/2000/svg';
var CX = 250, CY = 250, R = 210;
var TILT = 15 * Math.PI / 180;
var rotOffset = 0;

// Defs
var defs = document.createElementNS(NS, 'defs');
defs.innerHTML =
  '<radialGradient id="sg" cx="38%" cy="35%" r="65%">' +
    '<stop offset="0%" stop-color="#2a2520"/>' +
    '<stop offset="100%" stop-color="#0a0a0a"/>' +
  '</radialGradient>' +
  '<clipPath id="gc"><circle cx="250" cy="250" r="210"/></clipPath>';
svgEl.appendChild(defs);

// Sphere background
var sphere = document.createElementNS(NS, 'circle');
sphere.setAttribute('cx', CX); sphere.setAttribute('cy', CY); sphere.setAttribute('r', R);
sphere.setAttribute('fill', 'url(#sg)');
svgEl.appendChild(sphere);

// Clipped graticule layer
var gratG = document.createElementNS(NS, 'g');
gratG.setAttribute('clip-path', 'url(#gc)');
svgEl.appendChild(gratG);

// Clipped dots/labels layer
var dotsG = document.createElementNS(NS, 'g');
dotsG.setAttribute('clip-path', 'url(#gc)');
svgEl.appendChild(dotsG);

// Rim
var rim = document.createElementNS(NS, 'circle');
rim.setAttribute('cx', CX); rim.setAttribute('cy', CY); rim.setAttribute('r', R);
rim.setAttribute('stroke', 'rgba(200,169,126,0.28)');
rim.setAttribute('stroke-width', '1'); rim.setAttribute('fill', 'none');
svgEl.appendChild(rim);

// Tick marks
var tickG = document.createElementNS(NS, 'g');
for (var a = 0; a < 360; a += 10) {
  var rad = a * Math.PI / 180;
  var r2 = R + (a % 30 === 0 ? 9 : 5);
  var lx1 = CX + R  * Math.cos(rad), ly1 = CY + R  * Math.sin(rad);
  var lx2 = CX + r2 * Math.cos(rad), ly2 = CY + r2 * Math.sin(rad);
  var tick = document.createElementNS(NS, 'line');
  tick.setAttribute('x1', lx1.toFixed(1)); tick.setAttribute('y1', ly1.toFixed(1));
  tick.setAttribute('x2', lx2.toFixed(1)); tick.setAttribute('y2', ly2.toFixed(1));
  tick.setAttribute('stroke', a % 30 === 0 ? 'rgba(200,169,126,0.45)' : 'rgba(255,255,255,0.1)');
  tick.setAttribute('stroke-width', '1');
  tickG.appendChild(tick);
}
svgEl.appendChild(tickG);

// City data
var cities = [
  { name: 'Como',        lat:  45.81, lon:   9.09, url: 'https://www.giorgioelucrezia.it/' },
  { name: 'Los Angeles', lat:  34.05, lon: -118.24, url: 'https://www.gioriva.it/mondo/california/' },
  { name: 'Tokyo',       lat:  35.70, lon:  139.70, url: 'https://www.gioriva.it/mondo/giappone/' },
  { name: 'Hong Kong',   lat:  22.32, lon:  114.17, url: 'https://www.gioriva.it/mondo/indonesia/' },
  { name: 'New York',    lat:  40.71, lon:  -74.01, url: 'https://www.gioriva.it/mondo' },
  { name: 'Singapore',   lat:   1.35, lon:  103.82, url: 'https://www.gioriva.it/mondo/singapore/' },
  { name: 'Cancun',      lat:  21.16, lon:  -86.85, url: 'https://www.gioriva.it/mondo/messico/' }
];

function project(lat, lon) {
  var phi = (90 - lat) * Math.PI / 180;
  var lam = (lon + rotOffset) * Math.PI / 180;
  var x = R * Math.sin(phi) * Math.cos(lam);
  var y = R * Math.sin(phi) * Math.sin(lam);
  var z = R * Math.cos(phi);
  return {
    x: CX + x,
    y: CY - (y * Math.cos(TILT) - z * Math.sin(TILT)),
    z: y * Math.sin(TILT) + z * Math.cos(TILT)
  };
}

function drawGlobe() {
  gratG.innerHTML = '';
  dotsG.innerHTML = '';

  // Parallels
  for (var lat = -75; lat <= 75; lat += 15) {
    var d = '', pen = false;
    for (var lon = -180; lon <= 181; lon += 3) {
      var p = project(lat, lon);
      if (p.z > -20) {
        d += (pen ? 'L' : 'M') + p.x.toFixed(1) + ',' + p.y.toFixed(1);
        pen = true;
      } else { pen = false; }
    }
    if (d.length > 4) {
      var path = document.createElementNS(NS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', lat === 0 ? 'rgba(200,169,126,0.45)' : 'rgba(255,255,255,0.07)');
      path.setAttribute('stroke-width', lat === 0 ? '1' : '0.5');
      path.setAttribute('fill', 'none');
      gratG.appendChild(path);
    }
  }

  // Meridians
  for (var mlon = -180; mlon < 180; mlon += 15) {
    var md = '', mpen = false;
    for (var mlat = -90; mlat <= 90; mlat += 3) {
      var mp = project(mlat, mlon);
      if (mp.z > -20) {
        md += (mpen ? 'L' : 'M') + mp.x.toFixed(1) + ',' + mp.y.toFixed(1);
        mpen = true;
      } else { mpen = false; }
    }
    if (md.length > 4) {
      var mpath = document.createElementNS(NS, 'path');
      mpath.setAttribute('d', md);
      mpath.setAttribute('stroke', mlon === 0 ? 'rgba(200,169,126,0.45)' : 'rgba(255,255,255,0.07)');
      mpath.setAttribute('stroke-width', mlon === 0 ? '1' : '0.5');
      mpath.setAttribute('fill', 'none');
      gratG.appendChild(mpath);
    }
  }

  // Cities — dots in SVG, labels as real HTML links in overlay
  var overlay = document.getElementById('city-overlay');
  var wrapW = svgEl.clientWidth  || svgEl.getBoundingClientRect().width  || 500;
  var wrapH = svgEl.clientHeight || svgEl.getBoundingClientRect().height || 500;
  var scaleX = wrapW / 500;
  var scaleY = wrapH / 500;

  // Remove old link elements, keep count matched to cities
  var existingLinks = overlay.querySelectorAll('a');
  // We'll reuse or recreate as needed
  var linkEls = [];
  for (var li = 0; li < cities.length; li++) {
    if (existingLinks[li]) {
      linkEls.push(existingLinks[li]);
    } else {
      var a = document.createElement('a');
      a.target = '_blank';
      a.style.cssText = 'position:absolute;pointer-events:auto;display:flex;align-items:center;gap:6px;text-decoration:none;white-space:nowrap;transform:translateY(-50%)';
      overlay.appendChild(a);
      linkEls.push(a);
    }
  }
  // Hide extras
  for (var lx = cities.length; lx < existingLinks.length; lx++) {
    existingLinks[lx].style.display = 'none';
  }

  var visIdx = 0;
  for (var i = 0; i < cities.length; i++) {
    var c = cities[i];
    var cp = project(c.lat, c.lon);
    var a = linkEls[i];

    if (cp.z <= -20) {
      // Hidden — draw nothing, hide link
      a.style.display = 'none';
      continue;
    }

    // Dot + ring in SVG
    var cdot = document.createElementNS(NS, 'circle');
    cdot.setAttribute('cx', cp.x.toFixed(1)); cdot.setAttribute('cy', cp.y.toFixed(1));
    cdot.setAttribute('r', '2.5'); cdot.setAttribute('fill', '#C8A97E'); cdot.setAttribute('opacity', '0.9');
    dotsG.appendChild(cdot);

    var cring = document.createElementNS(NS, 'circle');
    cring.setAttribute('cx', cp.x.toFixed(1)); cring.setAttribute('cy', cp.y.toFixed(1));
    cring.setAttribute('r', '5.5'); cring.setAttribute('fill', 'none');
    cring.setAttribute('stroke', '#C8A97E'); cring.setAttribute('stroke-width', '0.6');
    cring.setAttribute('opacity', '0.3');
    dotsG.appendChild(cring);

    // Position HTML link over the dot
    var px = cp.x * scaleX;
    var py = cp.y * scaleY;
    a.href = c.url;
    a.style.display = 'flex';
    a.style.left = (px + 10 * scaleX) + 'px';
    a.style.top  = py + 'px';

    // Build inner content only once
    if (!a.dataset.built) {
      var dot2 = document.createElement('span');
      dot2.style.cssText = 'display:none';
      var lbl = document.createElement('span');
      lbl.style.cssText = 'font-family:Montserrat,sans-serif;font-size:8px;font-weight:400;letter-spacing:2px;color:#C8A97E;opacity:0.85;text-transform:uppercase;transition:opacity .2s';
      a.appendChild(dot2);
      a.appendChild(lbl);
      a.addEventListener('mouseenter', function() { document.body.classList.add('hov'); this.querySelector('span:last-child').style.opacity='1'; this.querySelector('span:last-child').style.color='#fff'; });
      a.addEventListener('mouseleave', function() { document.body.classList.remove('hov'); this.querySelector('span:last-child').style.opacity='0.85'; this.querySelector('span:last-child').style.color='#C8A97E'; });
      a.dataset.built = '1';
    }
    a.querySelector('span:last-child').textContent = c.name.toUpperCase();
  }

  rotOffset += 0.07;
  requestAnimationFrame(drawGlobe);
}

drawGlobe();
</script>
</body>
</html>
