<!DOCTYPE html>
<html lang="it" data-lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — Above Ground</title>
  <meta property="og:title" content="Works — Above Ground · Drone Photography">
  <meta property="og:description" content="Aerial photo albums: Como Lake, Eze-sur-mer, Cannes. Shot with DJI Mini Pro 5.">
  <meta property="og:image" content="https://www.gioriva.it/drone/logo_gr_drone.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.gioriva.it/drone/logo_gr_drone.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#03040a;--bg2:#07090f;--cyan:#00d4ff;--cyan-dim:#0089a8;--orange:#ff6c2f;--white:#e8eef5;--muted:#4a5568;--border:rgba(0,212,255,0.12);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;}
    .cursor{position:fixed;width:8px;height:8px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(0,212,255,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s ease;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(3,4,10,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .nav-logo img{height:44px;width:auto;}
    .nav-logo-text{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:0.3em;color:var(--cyan);text-transform:uppercase;}
    .nav-right{display:flex;align-items:center;gap:40px;}
    .nav-links{display:flex;gap:40px;list-style:none;}
    .nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,238,245,0.6);text-decoration:none;transition:color 0.2s;position:relative;}
    .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:100%;height:1px;background:var(--cyan);transition:right 0.3s;}
    .nav-links a:hover{color:var(--white);} .nav-links a:hover::after{right:0;} .nav-links a.active{color:var(--cyan);}
    .lang-toggle{display:flex;align-items:center;border:1px solid var(--border);overflow:hidden;}
    .lang-btn{padding:6px 14px;background:transparent;border:none;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);cursor:none;transition:all 0.2s;}
    .lang-btn.active{background:var(--cyan);color:var(--bg);} .lang-btn:hover:not(.active){color:var(--white);}
    .page-header{position:relative;padding:140px 48px 80px;overflow:hidden;border-bottom:1px solid var(--border);}
    .page-header-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(0,80,100,0.15)0%,transparent 65%);}
    #header-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
    .page-header-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.4em;text-transform:uppercase;color:var(--cyan);margin-bottom:20px;display:flex;align-items:center;gap:16px;position:relative;}
    .page-header-label::before{content:'';display:block;width:40px;height:1px;background:var(--cyan);}
    .page-header h1{font-family:'Orbitron',monospace;font-size:clamp(48px,8vw,100px);font-weight:900;line-height:0.95;text-transform:uppercase;position:relative;}
    .page-header h1 em{font-style:normal;color:transparent;-webkit-text-stroke:1px rgba(232,238,245,0.2);}
    .page-header-meta{margin-top:32px;font-size:14px;color:rgba(232,238,245,0.4);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.15em;text-transform:uppercase;position:relative;}
    .filter-bar{padding:24px 48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:77px;z-index:50;}
    .filter-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-right:16px;}
    .filter-btn{padding:8px 20px;background:transparent;border:1px solid rgba(232,238,245,0.08);color:rgba(232,238,245,0.45);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;cursor:none;transition:all 0.2s;}
    .filter-btn:hover,.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.05);}
    .albums-container{padding:80px 48px;}
    .album-section{margin-bottom:120px;}
    .album-section.hidden{display:none;}
    .album-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border);}
    .album-location{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.4em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;}
    .album-title{font-family:'Orbitron',monospace;font-size:clamp(28px,4vw,52px);font-weight:900;text-transform:uppercase;line-height:1;}
    .album-info{text-align:right;}
    .album-count{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:transparent;-webkit-text-stroke:1px rgba(0,212,255,0.3);}
    .album-count-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
    .photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;grid-auto-rows:220px;}
    .photo-item{position:relative;overflow:hidden;cursor:none;background:var(--bg2);}
    .photo-item.wide{grid-column:span 2;} .photo-item.tall{grid-row:span 2;} .photo-item.large{grid-column:span 2;grid-row:span 2;}
    .photo-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.4s;filter:brightness(0.82) saturate(0.85);}
    .photo-item:hover img{transform:scale(1.08);filter:brightness(0.6) saturate(1.15);}
    .photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background 0.3s;}
    .photo-item:hover .photo-overlay{background:rgba(0,0,0,0.2);}
    .photo-zoom-icon{width:48px;height:48px;border:1px solid rgba(0,212,255,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--cyan);opacity:0;transform:scale(0.5);transition:all 0.3s;}
    .photo-item:hover .photo-zoom-icon{opacity:1;transform:scale(1);}
    .photo-num{position:absolute;bottom:12px;right:12px;font-family:'Orbitron',monospace;font-size:10px;color:rgba(232,238,245,0.3);letter-spacing:0.1em;}
    .lightbox{position:fixed;inset:0;background:rgba(3,4,10,0.97);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .lightbox.open{opacity:1;pointer-events:all;}
    .lightbox-img-wrap{position:relative;max-width:90vw;max-height:88vh;display:flex;align-items:center;justify-content:center;}
    .lightbox-img-wrap img{max-width:90vw;max-height:85vh;object-fit:contain;transition:opacity 0.25s;}
    .lightbox-close{position:absolute;top:24px;right:24px;width:44px;height:44px;border:1px solid rgba(0,212,255,0.3);background:transparent;color:var(--cyan);cursor:none;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .lightbox-close:hover{background:rgba(0,212,255,0.1);border-color:var(--cyan);}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;border:1px solid rgba(0,212,255,0.2);background:rgba(3,4,10,0.8);color:var(--cyan);cursor:none;display:flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:10;}
    .lightbox-nav:hover{border-color:var(--cyan);background:rgba(0,212,255,0.08);}
    .lightbox-prev{left:16px;} .lightbox-next{right:16px;}
    .lightbox-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:11px;letter-spacing:0.3em;color:rgba(232,238,245,0.35);}
    .lightbox-album{position:absolute;bottom:24px;left:24px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--cyan-dim);}
    footer{border-top:1px solid var(--border);padding:48px;display:flex;justify-content:space-between;align-items:center;}
    .footer-logo{display:flex;align-items:center;gap:10px;}
    .footer-logo img{height:32px;}
    .footer-copy{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.15em;color:var(--muted);}
    .reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease;}
    .reveal.visible{opacity:1;transform:translateY(0);}
    @media(max-width:900px){
      nav{padding:14px 24px;} .nav-logo-text{display:none;}
      .page-header{padding:120px 24px 60px;}
      .filter-bar{padding:16px 24px;flex-wrap:wrap;}
      .albums-container{padding:60px 24px;}
      .photo-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:180px;}
      .photo-item.wide,.photo-item.large{grid-column:span 2;}
      footer{flex-direction:column;gap:16px;padding:32px 24px;}
    }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-text">Giorgio Riva</span>
  </a>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">Home</a></li>
      <li><a href="works.html" class="active" data-i18n="nav_works">Works</a></li>
    </ul>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn active" data-lang="it">IT</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-bg"></div>
  <canvas id="header-canvas"></canvas>
  <div class="page-header-label" data-i18n="portfolio_label">Portfolio</div>
  <h1><span data-i18n="works_title">Works</span><br><em data-i18n="works_subtitle">From Above</em></h1>
  <div class="page-header-meta" data-i18n="page_meta">3 Albums · 19 Photographs · DJI Mini Pro 5</div>
</div>

<div class="filter-bar">
  <span class="filter-label" data-i18n="filter_label">Filter</span>
  <button class="filter-btn active" data-filter="all" data-i18n="filter_all">All</button>
  <button class="filter-btn" data-filter="como-lake">Como Lake</button>
  <button class="filter-btn" data-filter="eze-sur-mer">Eze-sur-mer</button>
  <button class="filter-btn" data-filter="cannes">Cannes</button>
</div>

<div class="albums-container" id="albumsContainer"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
  <div class="lightbox-img-wrap"><img id="lbImg" src="" alt=""></div>
  <button class="lightbox-nav lightbox-next" id="lbNext"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
  <div class="lightbox-album" id="lbAlbum"></div>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>

<footer>
  <div class="footer-logo"></div>
  <div class="footer-copy" data-i18n="footer_copy">© 2026 · Aerial Photography · DJI Mini Pro 5</div>
</footer>

<script src="photos_data.js"></script>
<script>
const TRANSLATIONS = {
  en: {
    nav_home:"Home", nav_works:"Works",
    portfolio_label:"Portfolio", works_title:"Works", works_subtitle:"From Above",
    page_meta:"3 Albums · 19 Photographs · DJI Mini Pro 5",
    filter_label:"Filter", filter_all:"All",
    footer_copy:"© 2026 · Aerial Photography · DJI Mini Pro 5",
    photos_label:"Photographs"
  },
  it: {
    nav_home:"Home", nav_works:"Lavori",
    portfolio_label:"Portfolio", works_title:"Lavori", works_subtitle:"Dall'Alto",
    page_meta:"3 Album · 19 Fotografie · DJI Mini Pro 5",
    filter_label:"Filtra", filter_all:"Tutti",
    footer_copy:"© 2026 · Fotografia Aerea · DJI Mini Pro 5",
    photos_label:"Fotografie"
  }
};

const albumMeta = {
  "Como Lake":   { loc_en:"Lake · Como, Italy",    loc_it:"Lago · Como, Italia",   filter:"como-lake" },
  "Eze-sur-mer": { loc_en:"Coast · French Riviera", loc_it:"Costa · Costa Azzurra", filter:"eze-sur-mer" },
  "Cannes":      { loc_en:"City · Alpes-Maritimes", loc_it:"Città · Alpi Marittime", filter:"cannes" }
};

const layoutPatterns = [
  ['large','normal','normal','wide','normal','normal','normal','normal'],
  ['wide','tall','normal','normal','normal','wide'],
  ['tall','normal','large','normal','normal'],
];

let currentLang = 'it';

function applyLang(lang) {
  currentLang = lang;
  document.documentElement.setAttribute('lang', lang);
  const t = TRANSLATIONS[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.title = lang === 'it' ? 'Lavori — Above Ground' : 'Works — Above Ground';
  buildAlbums();
}

document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));

// CURSOR
const cursor=document.getElementById('cursor'), ring=document.getElementById('cursorRing');
document.addEventListener('mousemove',e=>{ cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},60); });

// HEADER CANVAS
const hc=document.getElementById('header-canvas'), hctx=hc.getContext('2d');
function resizeHC(){ hc.width=hc.offsetWidth; hc.height=hc.offsetHeight; }
resizeHC(); window.addEventListener('resize',resizeHC);
let scanY=0;
function animateScan(){
  requestAnimationFrame(animateScan); hctx.clearRect(0,0,hc.width,hc.height);
  hctx.strokeStyle='rgba(0,212,255,0.04)'; hctx.lineWidth=1;
  for(let x=0;x<hc.width;x+=60){ hctx.beginPath();hctx.moveTo(x,0);hctx.lineTo(x,hc.height);hctx.stroke(); }
  for(let y=0;y<hc.height;y+=60){ hctx.beginPath();hctx.moveTo(0,y);hctx.lineTo(hc.width,y);hctx.stroke(); }
  scanY=(scanY+1.5)%hc.height;
  const sg=hctx.createLinearGradient(0,scanY-40,0,scanY+40);
  sg.addColorStop(0,'transparent');sg.addColorStop(0.5,'rgba(0,212,255,0.08)');sg.addColorStop(1,'transparent');
  hctx.fillStyle=sg; hctx.fillRect(0,scanY-40,hc.width,80);
}
animateScan();

// BUILD ALBUMS
function buildAlbums() {
  const container=document.getElementById('albumsContainer');
  container.innerHTML='';
  const t=TRANSLATIONS[currentLang];
  Object.keys(PHOTOS).forEach((album,ai)=>{
    const meta=albumMeta[album];
    const photos=PHOTOS[album];
    const pattern=layoutPatterns[ai]||[];
    const loc=currentLang==='it'?meta.loc_it:meta.loc_en;
    const section=document.createElement('section');
    section.className='album-section reveal';
    section.id=album.replace(/\s+/g,'-').toLowerCase();
    section.dataset.filter=meta.filter;
    section.innerHTML=`
      <div class="album-header">
        <div>
          <div class="album-location">${loc}</div>
          <div class="album-title">${album}</div>
        </div>
        <div class="album-info">
          <div class="album-count">0${photos.length}</div>
          <div class="album-count-label">${t.photos_label}</div>
        </div>
      </div>
      <div class="photo-grid" id="grid-${ai}"></div>
    `;
    container.appendChild(section);
    const grid=section.querySelector(`#grid-${ai}`);
    photos.forEach((src,pi)=>{
      const lc=pattern[pi]||'normal';
      const item=document.createElement('div');
      item.className='photo-item'+(lc!=='normal'?' '+lc:'');
      item.dataset.album=album; item.dataset.idx=pi;
      item.innerHTML=`<img src="${src}" alt="${album} ${pi+1}" loading="lazy"><div class="photo-overlay"><div class="photo-zoom-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/></svg></div></div><div class="photo-num">${String(pi+1).padStart(2,'0')}</div>`;
      item.addEventListener('click',()=>openLightbox(album,pi));
      grid.appendChild(item);
    });
  });

  // Re-observe reveals
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

  // Re-apply filter
  const activeFilter=document.querySelector('.filter-btn.active');
  if(activeFilter && activeFilter.dataset.filter!=='all') {
    document.querySelectorAll('.album-section').forEach(s=>{
      s.classList.toggle('hidden', s.dataset.filter!==activeFilter.dataset.filter);
    });
  }
}

// OBSERVER
const observer=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:0.05});

// FILTER
document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const f=btn.dataset.filter;
  document.querySelectorAll('.album-section').forEach(s=>{
    s.classList.toggle('hidden', f!=='all' && s.dataset.filter!==f);
  });
}));

// LIGHTBOX
let lbAlbum='', lbIdx=0;
const lightbox=document.getElementById('lightbox'), lbImg=document.getElementById('lbImg');
const lbCounter=document.getElementById('lbCounter'), lbAlbumEl=document.getElementById('lbAlbum');
function openLightbox(album,idx){ lbAlbum=album; lbIdx=idx; updateLB(); lightbox.classList.add('open'); document.body.style.overflow='hidden'; }
function updateLB(){ const p=PHOTOS[lbAlbum]; lbImg.style.opacity='0'; lbImg.src=p[lbIdx]; lbImg.onload=()=>{lbImg.style.opacity='1';}; lbCounter.textContent=String(lbIdx+1).padStart(2,'0')+' / '+String(p.length).padStart(2,'0'); lbAlbumEl.textContent=lbAlbum.toUpperCase(); }
function closeLB(){ lightbox.classList.remove('open'); document.body.style.overflow=''; }
document.getElementById('lbClose').addEventListener('click',closeLB);
document.getElementById('lbPrev').addEventListener('click',()=>{lbIdx=(lbIdx-1+PHOTOS[lbAlbum].length)%PHOTOS[lbAlbum].length;updateLB();});
document.getElementById('lbNext').addEventListener('click',()=>{lbIdx=(lbIdx+1)%PHOTOS[lbAlbum].length;updateLB();});
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLB();});
document.addEventListener('keydown',e=>{
  if(!lightbox.classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowLeft'){lbIdx=(lbIdx-1+PHOTOS[lbAlbum].length)%PHOTOS[lbAlbum].length;updateLB();}
  if(e.key==='ArrowRight'){lbIdx=(lbIdx+1)%PHOTOS[lbAlbum].length;updateLB();}
});

if(window.location.hash){setTimeout(()=>{const el=document.querySelector(window.location.hash);if(el)el.scrollIntoView({behavior:'smooth'});},500);}

applyLang(currentLang);
</script>
</body>
</html>
